<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  
  <defs>
    <pattern id="mushonge-grid" x="0" y="0" width="180" height="160" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.85">
        <path d="M30 130 Q90 10 150 130 Z"></path>
        <path d="M40 130 Q90 30 140 130"></path>
        <path d="M52 130 Q90 50 128 130"></path>
        <path d="M64 130 Q90 70 116 130"></path>
        <path d="M76 130 Q90 90 104 130"></path>
        <line x1="20" y1="132" x2="160" y2="132"></line>
      </g>
    </pattern>

    
    <symbol id="motif-leaf" viewBox="0 0 100 200">
      <path d="M50 6 C 20 60 14 130 50 196 C 86 130 80 60 50 6 Z" fill="currentColor"></path>
      <path d="M50 14 L50 188" stroke="rgba(0,0,0,0.18)" stroke-width="1.4" fill="none"></path>
      <g stroke="rgba(0,0,0,0.18)" stroke-width="1" fill="none">
        <path d="M50 40 Q66 56 70 78"></path>
        <path d="M50 40 Q34 56 30 78"></path>
        <path d="M50 72 Q70 90 74 116"></path>
        <path d="M50 72 Q30 90 26 116"></path>
        <path d="M50 108 Q68 124 70 148"></path>
        <path d="M50 108 Q32 124 30 148"></path>
      </g>
    </symbol>

    
    <symbol id="motif-cherry" viewBox="0 0 60 60">
      <circle cx="30" cy="34" r="22" fill="currentColor"></circle>
      <path d="M30 14 Q26 4 14 4" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round"></path>
      <circle cx="22" cy="28" r="3" fill="rgba(255,255,255,0.32)"></circle>
    </symbol>

    
    <symbol id="motif-bean" viewBox="0 0 80 120">
      <ellipse cx="40" cy="60" rx="32" ry="56" fill="currentColor"></ellipse>
      <path d="M40 8 C 32 40 32 80 40 112" stroke="rgba(0,0,0,0.32)" stroke-width="3" fill="none"></path>
    </symbol>

    
    <symbol id="motif-ribbon" viewBox="0 0 1440 120" preserveAspectRatio="none">
      <path d="M0 60 C 240 0, 480 120, 720 60 S 1200 0, 1440 60 L 1440 120 L 0 120 Z" fill="currentColor"></path>
    </symbol>

    
    <symbol id="motif-wave-soft" viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path d="M0 40 C 240 80, 480 0, 720 40 S 1200 80, 1440 40 L 1440 80 L 0 80 Z" fill="currentColor" opacity="0.9"></path>
    </symbol>

    
    <pattern id="mushonge-dots" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="1.2" fill="currentColor" opacity="0.55"></circle>
      <path d="M6 38 Q22 14 38 38" stroke="currentColor" stroke-width="0.7" fill="none" opacity="0.25"></path>
    </pattern>

    
    <symbol id="motif-steam" viewBox="0 0 100 160">
      <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.8">
        <path d="M30 150 C 22 120 50 100 42 70 C 36 48 56 36 50 12"></path>
        <path d="M58 150 C 66 122 42 102 52 76 C 60 56 44 40 56 18"></path>
        <path d="M44 150 C 48 130 40 116 46 96"></path>
      </g>
    </symbol>
  </defs>
</svg>